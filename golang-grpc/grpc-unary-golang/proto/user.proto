syntax = "proto3";

//different proto files will different package names for segration
package user;

//file will be generated and kept in this folder
option go_package = "./proto";

service UserService {
  rpc GetUser(UserRequest) returns (UserResponse);

}

message UserRequest {
  int32 id = 1;

}
message UserResponse {
  int32 id = 1;
  string name = 2;

}